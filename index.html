<!DOCTYPE 
<html>
  <head>
    <meta charset="utf-8" />
    <title>WeiZi Art AR 數位名片</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      /* 霧玻璃 UI 容器與按鈕樣式設定 */
      #ui-container {
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 10;
        pointer-events: none;
      }
      .btn {
        padding: 10px 15px;
        font-size: 14px;
        font-weight: bold;
        border-radius: 12px;
        margin: 0 5px;
        cursor: pointer;
        pointer-events: auto;
        text-align: center;
        transition: all 0.3s ease;
        color: #333;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .btn:active {
        background: rgba(255, 255, 255, 0.6);
        transform: scale(0.95);
      }
    </style>

    <script>
      window.playSound = function() {
        const sound = document.getElementById('click-sound');
        if(sound) {
          sound.currentTime = 0; 
          sound.play().catch(e => console.log("等待使用者互動後播放音效"));
        }
      };

      AFRAME.registerComponent('touch-controls', {
        init: function () {
          this.touchStart = this.touchStart.bind(this);
          this.touchMove = this.touchMove.bind(this);
          this.touchEnd = this.touchEnd.bind(this);

          this.el.sceneEl.canvas.addEventListener('touchstart', this.touchStart);
          this.el.sceneEl.canvas.addEventListener('touchmove', this.touchMove);
          this.el.sceneEl.canvas.addEventListener('touchend', this.touchEnd);

          this.isDragging = false;
          this.previousPosition = { x: 0, y: 0 };
          this.isPinching = false;
          this.initialDistance = 0;
          this.initialScale = { x: 1, y: 1, z: 1 };
        },
        touchStart: function (evt) {
          if (!this.el.getAttribute('visible')) return;
          
          if (evt.touches.length === 1) {
            this.isDragging = true;
            this.previousPosition = { x: evt.touches[0].screenX, y: evt.touches[0].screenY };
          } else if (evt.touches.length === 2) {
            this.isPinching = true;
            this.initialDistance = this.getDistance(evt.touches);
            this.initialScale = this.el.object3D.scale.clone();
          }
        },
        touchMove: function (evt) {
          if (!this.el.getAttribute('visible')) return;
          
          if (this.isDragging && evt.touches.length === 1) {
            const deltaX = evt.touches[0].screenX - this.previousPosition.x;
            const deltaY = evt.touches[0].screenY - this.previousPosition.y;
            
            this.el.object3D.rotation.y += deltaX * 0.01;
            this.el.object3D.rotation.x += deltaY * 0.01;
            
            this.previousPosition = { x: evt.touches[0].screenX, y: evt.touches[0].screenY };
          } else if (this.isPinching && evt.touches.length === 2) {
            const currentDistance = this.getDistance(evt.touches);
            const scaleFactor = currentDistance / this.initialDistance;
            
            this.el.object3D.scale.set(
              this.initialScale.x * scaleFactor,
              this.initialScale.y * scaleFactor,
              this.initialScale.z * scaleFactor
            );
          }
        },
        touchEnd: function (evt) {
          if (evt.touches.length < 2) this.isPinching = false;
          if (evt.touches.length === 0) this.isDragging = false;
        },
        getDistance: function (touches) {
          const dx = touches[0].screenX - touches[1].screenX;
          const dy = touches[0].screenY - touches[1].screenY;
          return Math.sqrt(dx * dx + dy * dy);
        }
      });

      window.showImage = function(assetId) {
        const plane = document.querySelector('#display-plane');
        const model = document.querySelector('#display-model');
        const shadow = document.querySelector('#glow-shadow');
        
        if(model) model.setAttribute('visible', false);
        
        if(plane) {
          if(assetId) plane.setAttribute('src', assetId);
          plane.setAttribute('visible', true);
          if(shadow) shadow.setAttribute('visible', true);
          
          plane.setAttribute('scale', '0 0 0');
          plane.setAttribute('rotation', '0 0 0');
          
          plane.emit('playScale');
          setTimeout(() => {
            plane.emit('playFloat');
            if(shadow) shadow.emit('playFloat'); 
          }, 100); 
        }
      };

      window.show3D = function(assetId) {
        const plane = document.querySelector('#display-plane');
        const model = document.querySelector('#display-model');
        const shadow = document.querySelector('#glow-shadow');
        
        if(plane) plane.setAttribute('visible', false);
        if(shadow) shadow.setAttribute('visible', false);
        
        if(model) {
          if(assetId) model.setAttribute('gltf-model', assetId);
          model.setAttribute('visible', true);
          // 【核心修正 1】：JavaScript 裡也要同步把模型的預設比例縮小到 0.05
          model.setAttribute('scale', '0.05 0.05 0.05'); 
          model.setAttribute('rotation', '0 0 0'); 
        }
      };

      AFRAME.registerComponent('marker-handler', {
        init: function () {
          this.el.addEventListener('markerFound', () => {
            window.showImage('#card-img'); 
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <audio id="click-sound" src="./assets/click.mp3" preload="auto"></audio>

    <div id="ui-container">
      <div class="btn" onclick="playSound(); showImage('#card-img')">🖼️ 平面名片</div>
      <div class="btn" onclick="playSound(); window.open('https://www.facebook.com/WeiZiArt', '_blank')"> 個人FB介紹</div>
      <div class="btn" onclick="playSound(); window.open('https://www.youtube.com/@ParisWeizi', '_blank')"> 個人影片</div>
      <div class="btn" onclick="playSound(); show3D('#star-model')">🤖 3D 動態</div>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
      renderer="logarithmicDepthBuffer: true; colorManagement: true;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <img id="card-img" src="./assets/my-card.jpg">
        <a-asset-item id="star-model" src="./assets/star.glb"></a-asset-item>
      </a-assets>

      <a-marker marker-handler type="pattern" url="./assets/weizi.patt" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
      </a-marker>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      
     <a-entity camera look-controls="enabled: false">
        
        <a-plane id="display-plane" 
                 touch-controls
                 src="#card-img" 
                 position="0 0.02 -0.1" 
                 rotation="0 0 0" 
                 width="0.15" 
                 height="0.1"
                 visible="false"
                 animation__scale="property: scale; from: 0 0 0; to: 1 1 1; dur: 1000; easing: easeOutElastic; startEvents: playScale"
                 animation__float="property: position; from: 0 0.02 -0.1; to: 0 0.03 -0.1; dir: alternate; dur: 1000; loop: true; startEvents: playFloat">
        </a-plane>

        <a-plane id="glow-shadow"
                 width="0.15" height="0.1"
                 rotation="-90 0 0" 
                 position="0 -0.05 -0.15" 
                 material="color: #0088ff; transparent: true; opacity: 0.8; shader: flat;"
                 visible="false"
                 animation__scale="property: scale; from: 1 1 1; to: 0.6 0.6 0.6; dir: alternate; dur: 1000; loop: true; startEvents: playFloat"
                 animation__opacity="property: opacity; from: 0.8; to: 0.2; dir: alternate; dur: 1000; loop: true; startEvents: playFloat">
        </a-plane>

        <a-entity id="display-model" 
                  touch-controls
                  gltf-model="#star-model" 
                  scale="0.05 0.05 0.05" 
                  position="0 -0.02 -0.1"
                  visible="false"
                  animation-mixer>
        </a-entity>

      </a-entity>
      
    </a-scene>
  </body>
</html>
