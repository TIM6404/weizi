<!DOCTYPE 
<html>
  <head>
    <meta charset="utf-8" />
    <title>WeiZi Art AR 數位名片</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      #ui-container {
        position: absolute; bottom: 20px; left: 0; width: 100%;
        display: flex; justify-content: center; z-index: 10;
      }
      .btn {
        padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 12px;
        margin: 0 5px; cursor: pointer; text-align: center;
        background: rgba(255, 255, 255, 0.8); border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      }
      .btn:active { transform: scale(0.95); }
    </style>

    <script>
      // 完美加回音效播放引擎
      function playSound() {
        const sound = document.getElementById('click-sound');
        if(sound) {
          sound.currentTime = 0; 
          sound.play().catch(e => console.log("等待使用者互動後播放音效"));
        }
      }

      function showItem(itemId) {
        document.getElementById('card-wrapper').setAttribute('visible', itemId === 'card');
        document.getElementById('model-wrapper').setAttribute('visible', itemId === 'model');
        
        if(itemId === 'card') document.getElementById('card-img-entity').emit('pop');
        if(itemId === 'model') document.getElementById('model-entity').emit('pop');
      }

      AFRAME.registerComponent('simple-touch', {
        init: function () {
          this.touchStart = this.touchStart.bind(this);
          this.touchMove = this.touchMove.bind(this);
          window.addEventListener('touchstart', this.touchStart);
          window.addEventListener('touchmove', this.touchMove);
          this.isDragging = false;
          this.previousPosition = { x: 0, y: 0 };
        },
        touchStart: function (evt) {
          if (!this.el.getAttribute('visible')) return;
          if (evt.touches.length === 1) {
            this.isDragging = true;
            this.previousPosition = { x: evt.touches[0].screenX, y: evt.touches[0].screenY };
          }
        },
        touchMove: function (evt) {
          if (!this.el.getAttribute('visible') || !this.isDragging) return;
          const deltaX = evt.touches[0].screenX - this.previousPosition.x;
          const deltaY = evt.touches[0].screenY - this.previousPosition.y;
          this.el.object3D.rotation.y += deltaX * 0.01;
          this.el.object3D.rotation.x += deltaY * 0.01;
          this.previousPosition = { x: evt.touches[0].screenX, y: evt.touches[0].screenY };
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <audio id="click-sound" src="./assets/click.mp3" preload="auto"></audio>

    <div id="ui-container">
      <div class="btn" onclick="playSound(); showItem('card')">🖼️ 平面名片</div>
      <div class="btn" onclick="playSound(); window.open('https://www.facebook.com/WeiZiArt', '_blank')">FB介紹</div>
      <div class="btn" onclick="playSound(); window.open('https://www.youtube.com/@ParisWeizi', '_blank')">影片</div>
      <div class="btn" onclick="playSound(); showItem('model')">🤖 3D動態</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img id="card-texture" src="./assets/my-card.jpg">
        <a-asset-item id="model-data" src="./assets/star.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="./assets/weizi.patt"></a-marker>
      <a-light type="ambient" intensity="1.5"></a-light>
      
      <a-entity camera look-controls="enabled: false">
        <a-entity position="0 0 -3">
          
          <a-entity id="card-wrapper" simple-touch visible="true">
             <a-image id="card-img-entity" src="#card-texture" width="1.2" height="0.8" position="0 0 0"
                      animation__pop="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; easing: easeOutElastic; startEvents: pop"
                      animation__float="property: position; from: 0 -0.1 0; to: 0 0.1 0; dir: alternate; dur: 1500; loop: true">
             </a-image>
          </a-entity>

          <a-entity id="model-wrapper" simple-touch visible="false">
             <a-entity id="model-entity" gltf-model="#model-data" scale="0.4 0.4 0.4" position="0 -0.5 0"
                       animation__pop="property: scale; from: 0 0 0; to: 0.4 0.4 0.4; dur: 800; easing: easeOutElastic; startEvents: pop">
             </a-entity>
          </a-entity>

        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
