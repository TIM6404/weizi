<!DOCTYPE 
<html>
  <head>
    <meta charset="utf-8" />
    <title>WeiZi Art AR 數位名片</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      #ui-container {
        position: absolute; bottom: 20px; left: 0; width: 100%;
        display: flex; justify-content: center; z-index: 10;
      }
      .btn {
        padding: 10px 15px; font-size: 14px; font-weight: bold; border-radius: 12px;
        margin: 0 5px; cursor: pointer; text-align: center;
        background: rgba(255, 255, 255, 0.8); border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      }
      .btn:active { transform: scale(0.95); }
    </style>

    <script>
      // ==========================================
      // 【插入點 1】：專屬數據追蹤引擎放在 <script> 的最前面
      // ==========================================
      function trackInteraction(actionName) {
        const currentCardId = 'WeiZi_Card_01'; // 你的名片專屬代號
        
        // 【已精確修復】：為網址加上單引號，將其轉換為標準字串
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbzDL4JaeiVHjYBOJeMMkZPuP_3BJudwYBTQ4l15BSDaj25kt6n0ZR4GeExxRlc_gfNFKw/exec'; 
        
        const requestUrl = scriptUrl + '?cardId=' + encodeURIComponent(currentCardId) + '&action=' + encodeURIComponent(actionName);
        
        fetch(requestUrl, { mode: 'no-cors' })
          .catch(error => console.log("數據紀錄連線異常"));
      }

      // 以下保留你原本的功能
      function playSound() {
        const sound = document.getElementById('click-sound');
        if(sound) {
          sound.volume = 1.0;
          sound.currentTime = 0; 
          let playPromise = sound.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => { console.log("瀏覽器安全阻擋"); });
          }
        }
      }

      function showItem(itemId) {
        document.getElementById('card-wrapper').setAttribute('visible', itemId === 'card');
        document.getElementById('model-wrapper').setAttribute('visible', itemId === 'model');
        
        if(itemId === 'card') document.getElementById('card-img-entity').emit('pop');
        if(itemId === 'model') document.getElementById('model-entity').emit('pop');
      }

      AFRAME.registerComponent('simple-touch', {
        init: function () {
          this.touchStart = this.touchStart.bind(this);
          this.touchMove = this.touchMove.bind(this);
          this.touchEnd = this.touchEnd.bind(this);
          window.addEventListener('touchstart', this.touchStart);
          window.addEventListener('touchmove', this.touchMove);
          window.addEventListener('touchend', this.touchEnd);
          
          this.isDragging = false;
          this.isPinching = false;
          this.previousPosition = { x: 0, y: 0 };
          this.initialDistance = 0;
          this.initialScale = { x: 1, y: 1, z: 1 };
        },
        getDistance: function (touches) {
          const dx = touches[0].screenX - touches[1].screenX;
          const dy = touches[0].screenY - touches[1].screenY;
          return Math.sqrt(dx * dx + dy * dy);
        },
        touchStart: function (evt) {
          if (!this.el.getAttribute('visible')) return;
          
          const targetEl = this.el.firstElementChild; 
          if (!targetEl) return;

          if (evt.touches.length === 1) {
            this.isDragging = true;
            this.previousPosition = { x: evt.touches[0].screenX, y: evt.touches[0].screenY };
          } else if (evt.touches.length === 2) {
            this.isPinching = true;
            this.initialDistance = this.getDistance(evt.touches);
            this.initialScale = targetEl.object3D.scale.clone();
          }
        },
        touchMove: function (evt) {
          if (!this.el.getAttribute('visible')) return;
          
          const targetEl = this.el.firstElementChild;
          if (!targetEl) return;

          if (this.isDragging && evt.touches.length === 1) {
            const deltaX = evt.touches[0].screenX - this.previousPosition.x;
            const deltaY = evt.touches[0].screenY - this.previousPosition.y;
            targetEl.object3D.rotation.y += deltaX * 0.01;
            targetEl.object3D.rotation.x += deltaY * 0.01;
            this.previousPosition = { x: evt.touches[0].screenX, y: evt.touches[0].screenY };
          } else if (this.isPinching && evt.touches.length === 2) {
            const currentDistance = this.getDistance(evt.touches);
            const scaleFactor = currentDistance / this.initialDistance;
            targetEl.object3D.scale.set(
              this.initialScale.x * scaleFactor,
              this.initialScale.y * scaleFactor,
              this.initialScale.z * scaleFactor
            );
          }
        },
        touchEnd: function (evt) {
          if (evt.touches.length < 2) this.isPinching = false;
          if (evt.touches.length === 0) this.isDragging = false;
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <audio id="click-sound" src="./assets/click.mp3" preload="auto"></audio>

    <div id="ui-container">
      <div class="btn" onclick="playSound(); trackInteraction('開啟_平面名片'); showItem('card')">🖼️ 平面名片</div>
      <div class="btn" onclick="playSound(); trackInteraction('點擊_FB介紹'); window.open('https://www.facebook.com/WeiZiArt', '_blank')">FB介紹</div>
      <div class="btn" onclick="playSound(); trackInteraction('點擊_個人影片'); window.open('https://www.youtube.com/@ParisWeizi', '_blank')">影片</div>
      <div class="btn" onclick="playSound(); trackInteraction('開啟_3D動態'); showItem('model')">🤖 3D動態</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img id="card-texture" src="./assets/my-card.jpg">
        <a-asset-item id="model-data" src="./assets/star.glb"></a-asset-item>
      </a-assets>

      <a-marker type="pattern" url="./assets/weizi.patt"></a-marker>
      <a-light type="ambient" intensity="1.5"></a-light>
      
      <a-entity camera look-controls="enabled: false">
        <a-entity position="0 0 -3">
          
          <a-entity id="card-wrapper" simple-touch visible="true">
             <a-image id="card-img-entity" src="#card-texture" width="0.9" height="0.6" position="0 0 0"
                      animation__pop="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; easing: easeOutElastic; startEvents: pop"
                      animation__float="property: position; from: 0 -0.1 0; to: 0 0.1 0; dir: alternate; dur: 1500; loop: true">
             </a-image>
          </a-entity>

          <a-entity id="model-wrapper" simple-touch visible="false">
             <a-entity id="model-entity" gltf-model="#model-data" scale="0.5 0.5 0.5" position="0 -0.5 0"
                       animation__pop="property: scale; from: 0 0 0; to: 0.5 0.5 0.5; dur: 800; easing: easeOutElastic; startEvents: pop">
             </a-entity>
          </a-entity>

        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
